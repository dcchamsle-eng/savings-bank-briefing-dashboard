<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>저축은행 뉴스 브리핑 대시보드</title>
<style>
  :root {
    --paper: #edece2;
    --paper-raised: #f6f5ec;
    --ink: #20242b;
    --ink-soft: #5b6270;
    --ink-faint: #8b8f7e;
    --rule: #d6d3c3;
    --rule-strong: #b6b29d;
    --navy: #26456f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Pretendard", sans-serif;
  }
  .hidden { display: none; }

  .gate-overlay {
    position: fixed; inset: 0; background: var(--paper);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .gate-box {
    background: var(--paper-raised); border: 1px solid var(--rule-strong);
    padding: 36px 32px; text-align: center; width: 320px;
  }
  .gate-box h1 { font-size: 16px; margin: 0 0 16px; color: var(--navy); }
  .gate-box input {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--rule-strong);
    margin-bottom: 10px; background: var(--paper);
  }
  .gate-box button {
    width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--navy);
    background: var(--navy); color: white; cursor: pointer;
  }
  .gate-box button:disabled { opacity: 0.6; cursor: default; }
  .gate-error { margin-top: 10px; font-size: 12.5px; color: #973c3c; min-height: 1em; }

  #wrap { max-width: 780px; margin: 0 auto; padding: 32px 20px 60px; }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding-bottom: 16px; border-bottom: 3px double var(--rule-strong); margin-bottom: 20px;
  }
  .top-bar h1 { font-size: 20px; margin: 0; color: var(--ink); }
  .date-picker select {
    font-size: 14px; padding: 8px 10px; border: 1px solid var(--rule-strong); background: var(--paper-raised);
  }
  .no-data {
    padding: 40px; text-align: center; color: var(--ink-faint); font-style: italic;
    border: 1px dashed var(--rule-strong);
  }
  iframe#reportFrame {
    width: 100%; min-height: 1400px; border: 1px solid var(--rule-strong); background: var(--paper);
  }
  .generated-at { margin-top: 18px; font-size: 11.5px; color: var(--ink-faint); text-align: right; }
</style>
</head>
<body>
<div class="gate-overlay" id="gateOverlay">
  <div class="gate-box">
    <h1>비밀번호를 입력하세요</h1>
    <input type="password" id="gatePassword" placeholder="비밀번호" autocomplete="off" />
    <button id="gateSubmit">확인</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>
<div id="wrap" class="hidden">
  <div class="top-bar">
    <h1>저축은행 뉴스 브리핑 대시보드</h1>
    <div class="date-picker">
      <select id="dateSelect"></select>
    </div>
  </div>
  <div id="reportHost"></div>
  <div class="generated-at">생성: 2026-07-13 19:52 KST</div>
</div>
<script>
function initDashboard(reports) {
  const dates = Object.keys(reports);
  const select = document.getElementById("dateSelect");
  const host = document.getElementById("reportHost");

  if (dates.length === 0) {
    host.innerHTML = '<div class="no-data">표시할 브리핑이 없습니다.</div>';
    return;
  }

  for (const d of dates) {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    select.appendChild(opt);
  }

  function renderDate(d) {
    host.innerHTML = "";
    const iframe = document.createElement("iframe");
    iframe.id = "reportFrame";
    iframe.srcdoc = reports[d];
    host.appendChild(iframe);
  }

  select.addEventListener("change", () => renderDate(select.value));
  select.value = "2026-07-13";
  renderDate("2026-07-13");
}

async function derivePasswordKey(password, saltBytes, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: saltBytes, iterations, hash: "SHA-256" }, keyMaterial, 256);
  return new Uint8Array(bits);
}

async function hmacSha256(keyBytes, msgBytes) {
  const key = await crypto.subtle.importKey("raw", keyBytes, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
  const sig = await crypto.subtle.sign("HMAC", key, msgBytes);
  return new Uint8Array(sig);
}

async function expandKeystream(key, saltBytes, length) {
  let out = new Uint8Array(0);
  let counter = 0;
  while (out.length < length) {
    const counterBytes = new Uint8Array(4);
    new DataView(counterBytes.buffer).setUint32(0, counter, false);
    const msg = new Uint8Array(saltBytes.length + 4);
    msg.set(saltBytes, 0);
    msg.set(counterBytes, saltBytes.length);
    const block = await hmacSha256(key, msg);
    const combined = new Uint8Array(out.length + block.length);
    combined.set(out, 0);
    combined.set(block, out.length);
    out = combined;
    counter++;
  }
  return out.slice(0, length);
}

async function tryUnlock(password) {
  const saltBytes = new Uint8Array(ENCRYPTED.salt.match(/.{2}/g).map(b => parseInt(b, 16)));
  const cipherBytes = Uint8Array.from(atob(ENCRYPTED.cipher), c => c.charCodeAt(0));
  const key = await derivePasswordKey(password, saltBytes, ENCRYPTED.iterations);
  const keystream = await expandKeystream(key, saltBytes, cipherBytes.length);
  const plainBytes = cipherBytes.map((b, i) => b ^ keystream[i]);
  const text = new TextDecoder("utf-8", { fatal: true }).decode(plainBytes);
  return JSON.parse(text);
}

function unlock(data) {
  document.getElementById("gateOverlay").remove();
  document.getElementById("wrap").classList.remove("hidden");
  initDashboard(data);
}

const gateSubmit = document.getElementById("gateSubmit");
const gatePassword = document.getElementById("gatePassword");
const gateError = document.getElementById("gateError");

async function attemptUnlock() {
  gateError.textContent = "";
  gateSubmit.disabled = true;
  try {
    const data = await tryUnlock(gatePassword.value);
    sessionStorage.setItem("briefingPw", gatePassword.value);
    unlock(data);
  } catch (e) {
    gateError.textContent = "비밀번호가 틀렸습니다.";
    gateSubmit.disabled = false;
  }
}

gateSubmit.addEventListener("click", attemptUnlock);
gatePassword.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptUnlock(); });

(async () => {
  const saved = sessionStorage.getItem("briefingPw");
  if (saved) {
    try {
      const data = await tryUnlock(saved);
      unlock(data);
      return;
    } catch (e) { /* 저장된 비밀번호가 안 맞으면 다시 입력받는다 */ }
  }
  gatePassword.focus();
})();
